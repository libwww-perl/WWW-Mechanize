name    = WWW-Mechanize
author  = Andy Lester <andy at petdance.com>
license = Perl_5
main_module = lib/WWW/Mechanize.pm
copyright_holder = Andy Lester
copyright_year   = 2004

; Declared before the bundle so Git::Contributors sees the perl prereq when
; it runs register_prereqs and stays quiet about non-ascii contributor names.
[Prereqs / RuntimeRequires]
perl = 5.008006
HTML::Form = 6.08
HTTP::Message = 7.01

[@Author::OALDERS]
-remove = CheckChangesHasContent
-remove = MinimumPerl
-remove = Test::CPAN::Changes ; has invalid release dates
-remove = Test::Perl::Critic
-remove = Test::PodSpelling
-remove = Test::Synopsis
-remove = Test::TidyAll ; we lint/tidy with precious instead
-remove = ExtraTests
StaticInstall.mode = on
StaticInstall.dry_run = 0

[ExecDir]
dir = script

[RunExtraTests]

[Prereqs / TestRequires]
HTTP::Daemon = 6.12

[Prereqs / DevelopRequires]
App::perlimports = 0
App::perlvars = 0
LWP::Protocol::https = 6.07
Perl::Tidy = 0
Pod::Tidy = 0

; Strip the Code::TidyAll develop prereqs injected by the @Author::OALDERS
; bundle's "Modules for use with tidyall" Prereqs block. precious is now the
; single lint/tidy toolchain (see precious.toml). Perl::Tidy is kept above
; because precious's perltidy command needs it.
[RemovePrereqs]
remove = Code::TidyAll
remove = Code::TidyAll::Plugin::SortLines::Naturally
remove = Code::TidyAll::Plugin::Test::Vars
remove = Code::TidyAll::Plugin::UniqueLines
remove = Test::Code::TidyAll
remove = Test::Vars
remove = Perl::Critic

[Prereqs::Soften]
module = Compress::Zlib
to_relationship = recommends

[MetaProvides::Package]

[GitHubREADME::Badge]
badges = license
badges = version
badges = cpants
place = top
phase = build
branch = master
